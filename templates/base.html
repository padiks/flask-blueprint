<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Flask Blueprint" }}</title>
  <link href="{{ url_for('static', filename='img/favicon.png') }}" rel="icon" type="image/x-icon">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">  
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg bg-light border-bottom">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('home.index') }}">Flask Blueprint</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
		  <li class="nav-item"><a class="nav-link" href="{{ url_for('home.index') }}">Home</a></li>	
          <li class="nav-item"><a class="nav-link" href="{{ url_for('addition.index') }}">Addition</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Subtraction</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Multiplication</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Division</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="container mt-5">
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
